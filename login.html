<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Ticket Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    .login-card h1 {
      font-size: 1.4rem;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .login-card .form-group {
      margin-bottom: 1rem;
    }

    .login-card label {
      display: block;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    .login-card input {
      width: 100%;
      padding: .55rem .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: .95rem;
      box-sizing: border-box;
    }

    .login-card input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .login-card .btn {
      width: 100%;
      margin-top: .5rem;
      padding: .65rem;
      font-size: 1rem;
    }

    .login-error {
      color: var(--danger);
      font-size: .85rem;
      margin-top: .75rem;
      text-align: center;
      display: none;
    }

    .login-role {
      font-size: .78rem;
      color: var(--muted);
      text-align: center;
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🎫 Ticket Manager</h1>

    <div class="form-group">
      <label for="username">Utilizador</label>
      <input type="text" id="username" placeholder="username" autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn btn--primary" id="btn-login">Entrar</button>

    <p class="login-error" id="login-error"></p>

    <p class="login-role">
      Não tens conta? Fala com o administrador.
    </p>
  </div>

  <script type="module">
    import { login } from './js/auth.js';

    const btnLogin  = document.getElementById('btn-login');
    const errorEl   = document.getElementById('login-error');

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorEl.textContent = 'Preenche o utilizador e a password.';
        errorEl.style.display = 'block';
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'A entrar...';
      errorEl.style.display = 'none';

      try {
        await login(username, password);
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    }

    btnLogin.addEventListener('click', doLogin);

    // Permitir submeter com Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
